<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#065F46"/>
    </radialGradient>
    <radialGradient id="wingGradL" cx="70%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="60%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </radialGradient>
    <radialGradient id="wingGradR" cx="30%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="60%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sun disk at top -->
  <circle cx="60" cy="11" r="7" fill="url(#sunGrad)" opacity="0.95"/>
  <circle cx="60" cy="11" r="5" fill="#FCD34D"/>
  <!-- Sun rays -->
  <line x1="60" y1="2" x2="60" y2="0" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="5" x2="71.5" y2="3.5" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="50" y1="5" x2="48.5" y2="3.5" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="73" y1="11" x2="75" y2="11" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="47" y1="11" x2="45" y2="11" stroke="#FCD34D" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Left wing -->
  <path d="M58 45 C55 40 44 34 28 30 C16 27 8 30 6 36 C4 42 10 50 20 54 C30 58 44 57 52 52 C56 49 58 47 58 45Z"
        fill="url(#wingGradL)" opacity="0.95"/>
  <!-- Wing veins left -->
  <path d="M56 44 C50 40 38 35 24 31" stroke="#065F46" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M55 47 C48 44 36 40 22 38" stroke="#065F46" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M54 50 C47 48 36 46 24 45" stroke="#065F46" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M52 52 C46 51 37 51 26 51" stroke="#065F46" stroke-width="0.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Wing highlight left -->
  <path d="M56 42 C52 39 42 34 30 31" stroke="#A7F3D0" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Right wing -->
  <path d="M62 45 C65 40 76 34 92 30 C104 27 112 30 114 36 C116 42 110 50 100 54 C90 58 76 57 68 52 C64 49 62 47 62 45Z"
        fill="url(#wingGradR)" opacity="0.95"/>
  <!-- Wing veins right -->
  <path d="M64 44 C70 40 82 35 96 31" stroke="#065F46" stroke-width="0.7" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M65 47 C72 44 84 40 98 38" stroke="#065F46" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M66 50 C73 48 84 46 96 45" stroke="#065F46" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M68 52 C74 51 83 51 94 51" stroke="#065F46" stroke-width="0.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Wing highlight right -->
  <path d="M64 42 C68 39 78 34 90 31" stroke="#A7F3D0" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Body / thorax + abdomen -->
  <ellipse cx="60" cy="52" rx="13" ry="10" fill="url(#bodyGrad)" filter="url(#glow)"/>
  <ellipse cx="60" cy="66" rx="16" ry="19" fill="url(#bodyGrad)"/>

  <!-- Body detail lines (elytra) -->
  <line x1="60" y1="45" x2="60" y2="85" stroke="#065F46" stroke-width="1" opacity="0.5"/>
  <path d="M60 48 C58 52 57 60 57 68 C57 76 58 82 60 85" stroke="#047857" stroke-width="0.6" opacity="0.4" fill="none"/>
  <path d="M60 48 C62 52 63 60 63 68 C63 76 62 82 60 85" stroke="#047857" stroke-width="0.6" opacity="0.4" fill="none"/>
  <!-- Body segment lines -->
  <path d="M46 62 C50 63 55 64 60 64 C65 64 70 63 74 62" stroke="#065F46" stroke-width="0.7" opacity="0.45" fill="none"/>
  <path d="M46 70 C50 71 55 72 60 72 C65 72 70 71 74 70" stroke="#065F46" stroke-width="0.7" opacity="0.45" fill="none"/>
  <path d="M48 78 C52 79 56 79.5 60 79.5 C64 79.5 68 79 72 78" stroke="#065F46" stroke-width="0.6" opacity="0.4" fill="none"/>

  <!-- Highlight on body -->
  <ellipse cx="56" cy="58" rx="4" ry="6" fill="#6EE7B7" opacity="0.25"/>

  <!-- Head -->
  <ellipse cx="60" cy="42" rx="8" ry="6" fill="url(#bodyGrad)"/>
  <!-- Head detail / clypeus -->
  <path d="M53 41 C55 39 58 38 60 38 C62 38 65 39 67 41" stroke="#047857" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Antennae / horns -->
  <path d="M55 38 C52 33 50 28 52 22" stroke="#059669" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M65 38 C68 33 70 28 68 22" stroke="#059669" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <circle cx="52" cy="21" r="2" fill="#10B981"/>
  <circle cx="68" cy="21" r="2" fill="#10B981"/>

  <!-- Legs - left side (3 legs) -->
  <!-- Front left leg -->
  <path d="M50 50 C44 49 38 46 33 42" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M33 42 C30 40 27 41 25 43" stroke="#047857" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <!-- Mid left leg -->
  <path d="M48 60 C42 61 35 60 29 57" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M29 57 C26 56 23 57 21 59" stroke="#047857" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <!-- Back left leg -->
  <path d="M47 72 C41 74 35 76 28 72" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M28 72 C25 70 22 71 21 74" stroke="#047857" stroke-width="1.1" stroke-linecap="round" fill="none"/>

  <!-- Legs - right side (3 legs) -->
  <!-- Front right leg -->
  <path d="M70 50 C76 49 82 46 87 42" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M87 42 C90 40 93 41 95 43" stroke="#047857" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <!-- Mid right leg -->
  <path d="M72 60 C78 61 85 60 91 57" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M91 57 C94 56 97 57 99 59" stroke="#047857" stroke-width="1.1" stroke-linecap="round" fill="none"/>
  <!-- Back right leg -->
  <path d="M73 72 C79 74 85 76 92 72" stroke="#047857" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M92 72 C95 70 98 71 99 74" stroke="#047857" stroke-width="1.1" stroke-linecap="round" fill="none"/>

  <!-- Eyes -->
  <circle cx="56" cy="41" r="1.5" fill="#064E3B"/>
  <circle cx="64" cy="41" r="1.5" fill="#064E3B"/>
  <circle cx="56.5" cy="40.5" r="0.6" fill="#A7F3D0" opacity="0.8"/>
  <circle cx="64.5" cy="40.5" r="0.6" fill="#A7F3D0" opacity="0.8"/>

  <!-- Wing border accent -->
  <path d="M58 45 C55 40 44 34 28 30 C16 27 8 30 6 36 C4 42 10 50 20 54 C30 58 44 57 52 52 C56 49 58 47 58 45Z"
        stroke="#34D399" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M62 45 C65 40 76 34 92 30 C104 27 112 30 114 36 C116 42 110 50 100 54 C90 58 76 57 68 52 C64 49 62 47 62 45Z"
        stroke="#34D399" stroke-width="0.6" fill="none" opacity="0.5"/>
</svg>
